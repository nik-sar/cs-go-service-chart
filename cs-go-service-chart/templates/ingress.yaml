{{- if .Values.ingress.enabled }}
{{- range $idx, $rule := .Values.ingress.rules }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $.Release.Name }}-ingress-{{ $.Release.Namespace }}-{{ $idx }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    haproxy-ingress.github.io/rewrite-target: {{ $rule.rewriteTarget }}
spec:
  ingressClassName: haproxy
  rules:
    {{- range $rule.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}-svc-{{ $.Release.Namespace }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}